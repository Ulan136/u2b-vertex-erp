<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кабинет мастера — U2B-Vertex</title>
<!-- PWA: устанавливается как отдельное приложение со start_url /master -->
<link rel="manifest" href="/master.webmanifest">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Мастер">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('/sw.js').catch(function(){}); });
  }
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1a56db; --green:#059669; --orange:#d97706; --red:#dc2626;
  --bg:#f5f6fa; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);font-size:14px;overflow:hidden;}
/* Реальный экран телефона: во всю ширину, без рамки-макета и фейкового статус-бара */
.phone-frame{width:100%;max-width:600px;height:100dvh;margin:0 auto;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;position:relative;}
.nav-bar{background:#fff;border-top:1px solid var(--border);display:flex;padding:6px 0;flex-shrink:0;padding-bottom:calc(6px + var(--safe-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .15s;padding:4px 0;}
.nav-icon{font-size:22px;transition:transform .15s;position:relative;}
.nav-label{font-size:10px;color:var(--muted);font-weight:500;}
.nav-item.active .nav-label{color:var(--blue);font-weight:700;}
.nav-item.active .nav-icon{transform:scale(1.1);}
.nav-badge{position:absolute;top:-6px;right:-10px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;line-height:16px;border-radius:8px;text-align:center;padding:0 3px;}
.screen{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.screen.active{display:flex;}
.app-header{background:#fff;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10;}
.ah-right{display:flex;align-items:center;gap:10px;}
.ah-title{font-size:17px;font-weight:800;color:var(--text);}
.ah-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.avatar-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.card{background:var(--card);border-radius:14px;margin:10px 14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.card-inner{padding:14px 16px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.stats-row{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;}
.stat-chip{flex-shrink:0;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px;min-width:78px;text-align:center;}
.sc-num{font-size:20px;font-weight:800;line-height:1;}
.sc-lbl{font-size:10px;color:var(--muted);margin-top:2px;}
.sc-new .sc-num{color:var(--blue);}.sc-done .sc-num{color:var(--green);}.sc-urgent .sc-num{color:var(--red);}
.filter-row{display:flex;gap:8px;padding:6px 14px 4px;}
.fchip{flex:1;text-align:center;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;}
.fchip.on{background:#eff6ff;border-color:var(--blue);color:var(--blue);}
.order-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;margin:8px 14px;padding:13px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.order-card.done{border-color:#a7f3d0;background:#f0fdf4;}
.order-card.cancelled{border-color:#fca5a5;background:#fff5f5;opacity:.85;}
.oc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
.oc-no{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b7280;}
.oc-st{font-size:11px;font-weight:700;white-space:nowrap;}
.oc-client{font-weight:700;font-size:15px;}
.oc-phone{font-size:12px;color:#6b7280;margin:2px 0 6px;}
.oc-pos{font-size:12px;color:#374151;margin-bottom:2px;}
.oc-comment{font-size:12px;color:#6b7280;margin-top:5px;}
.oc-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.oc-btn{flex:1 1 46%;border:none;border-radius:9px;padding:9px;font-weight:700;font-size:12px;cursor:pointer;transition:transform .1s;}
.oc-btn:active{transform:scale(.97);}
.b-done{background:#059669;color:#fff;}.b-work{background:#eef2ff;color:#1d4ed8;}
.b-cancel{background:#fff7ed;color:#c2410c;}.b-photo{background:#f0f9ff;color:#0369a1;}
.b-comment{background:#eef2ff;color:#4338ca;}
.thumbs{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.thumb{width:52px;height:52px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.empty{text-align:center;color:#9ca3af;padding:30px 16px;font-size:14px;}
.loading{text-align:center;color:#9ca3af;padding:24px;}
/* bottom sheet */
.sheet-ov{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;}
.sheet-ov.open{display:flex;}
.sheet{width:100%;max-width:430px;background:#fff;border-radius:20px 20px 0 0;max-height:80vh;display:flex;flex-direction:column;padding-bottom:calc(12px + var(--safe-bottom));}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);}
.sheet-title{font-size:15px;font-weight:800;}
.sheet-close{background:var(--bg);border:none;color:var(--muted);font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer;}
.sheet-body{overflow-y:auto;padding:12px 16px;flex:1;}
.cmt{background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:8px;}
.cmt-head{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:3px;}
.cmt-text{font-size:13px;color:#111827;white-space:pre-wrap;word-break:break-word;}
.sheet-foot{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);}
.sheet-foot input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;outline:none;font-family:inherit;}
.sheet-foot button{border:none;background:var(--blue);color:#fff;border-radius:10px;padding:0 16px;font-weight:700;font-size:14px;cursor:pointer;}
.pg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pg-item{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.pg-item img{width:100%;height:100%;object-fit:cover;}
.pg-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:12px;cursor:pointer;}
.pg-add{aspect-ratio:1;border:2px dashed var(--border);border-radius:10px;background:#fafafa;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--muted);cursor:pointer;}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-out{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:13px;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;text-align:center;text-decoration:none;display:block;}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;display:none;white-space:nowrap;max-width:90%;}
.toast.show{display:block;}
</style>
</head>
<body>
<div class="phone-frame">

  <!-- ЗАЯВКИ -->
  <div class="screen active" id="screen-orders">
    <div class="app-header">
      <div>
        <div class="ah-title">Заявки — выезд</div>
        <div class="ah-sub" id="hdr-sub">Загрузка…</div>
      </div>
      <div class="ah-right"><span class="cc-bell-mount"></span><div class="avatar-sm" id="hdr-avatar">—</div></div>
    </div>
    <div class="filter-row">
      <div class="fchip on" id="f-today" onclick="setFilter('today')">Сегодня</div>
      <div class="fchip" id="f-all" onclick="setFilter('all')">Все</div>
    </div>
    <div class="stats-row" id="stats"></div>
    <div id="orders-list" style="flex:1;"></div>
    <div style="height:16px;"></div>
  </div>

  <!-- ИСТОРИЯ -->
  <div class="screen" id="screen-history">
    <div class="app-header"><div><div class="ah-title">История</div><div class="ah-sub">Выполненные заявки</div></div><div class="ah-right"><span class="cc-bell-mount"></span></div></div>
    <div id="history-list" style="flex:1;"></div>
    <div style="height:16px;"></div>
  </div>

  <!-- ЗАДАЧИ -->
  <div class="screen" id="screen-tasks">
    <div class="app-header"><div class="ah-title">Задачи</div><div class="ah-right"><span class="cc-bell-mount"></span></div></div>
    <div id="cc-tasks" style="flex:1;overflow-y:auto;"></div>
  </div>

  <!-- ПРОФИЛЬ -->
  <div class="screen" id="screen-profile">
    <div class="app-header"><div class="ah-title">Профиль</div><div class="ah-right"><span class="cc-bell-mount"></span></div></div>
    <div style="padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;">
      <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#059669,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;" id="pf-avatar">—</div>
      <div style="text-align:center;">
        <div style="font-size:18px;font-weight:800;" id="pf-name">—</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="pf-sub">🚗 Мастер</div>
      </div>
      <div style="background:#d1fae5;color:#065f46;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;">● Онлайн</div>
    </div>
    <div class="card"><div class="card-inner">
      <div class="card-title">Доступные модули</div>
      <div class="detail-row"><span>📋 Заявки (выездная)</span><span style="color:var(--green);">✅</span></div>
      <div class="detail-row"><span>📷 Фотоотчёт</span><span style="color:var(--green);">✅</span></div>
      <div class="detail-row"><span>💬 Комментарии</span><span style="color:var(--green);">✅</span></div>
    </div></div>
    <div style="padding:0 14px 14px;">
      <a href="/logout" class="btn-out" style="color:var(--red);border-color:#fca5a5;">🚪 Выйти</a>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav-bar">
    <div class="nav-item active" id="nav-orders" onclick="goScreen('orders')">
      <div class="nav-icon">📥<span class="nav-badge" id="nav-orders-badge" style="display:none;">0</span></div><div class="nav-label">Заявки</div></div>
    <div class="nav-item" id="nav-tasks" onclick="goScreen('tasks')"><div class="nav-icon">✅<span class="nav-badge" id="cc-tasks-badge" style="display:none;">0</span></div><div class="nav-label">Задачи</div></div>
    <div class="nav-item" id="nav-history" onclick="goScreen('history')"><div class="nav-icon">🗂</div><div class="nav-label">История</div></div>
    <div class="nav-item" id="nav-profile" onclick="goScreen('profile')"><div class="nav-icon">👤</div><div class="nav-label">Профиль</div></div>
  </div>
</div>

<!-- PHOTO SHEET -->
<div class="sheet-ov" id="photoSheet" onclick="if(event.target===this)closeSheet('photoSheet')">
  <div class="sheet">
    <div class="sheet-head"><div class="sheet-title">📷 Фото заявки</div><button class="sheet-close" onclick="closeSheet('photoSheet')">Готово</button></div>
    <div class="sheet-body"><div class="pg-grid" id="photoGrid"></div></div>
  </div>
</div>
<input type="file" id="photoInput" accept="image/*" capture="environment" multiple style="display:none;" onchange="onPhotoPick(event)">

<!-- COMMENT SHEET -->
<div class="sheet-ov" id="cmtSheet" onclick="if(event.target===this)closeSheet('cmtSheet')">
  <div class="sheet">
    <div class="sheet-head"><div class="sheet-title">💬 Комментарии</div><button class="sheet-close" onclick="closeSheet('cmtSheet')">Готово</button></div>
    <div class="sheet-body" id="cmtBody"></div>
    <div class="sheet-foot">
      <input id="cmtInput" placeholder="Написать комментарий…" onkeydown="if(event.key==='Enter')sendComment()">
      <button onclick="sendComment()">➤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/cabinet-common.js"></script>
<script>
const ORDERS_API='/api/v2/orders', COMMENTS_API='/api/v2/comments', ME_API='/api/v2/me';
let me=null, orders=[], filter='today', commentCounts={}, activeOrderId=null;

const ROLE_LABEL={admin:'Администратор',director:'Директор',accountant:'Бухгалтер',manager:'Менеджер',master:'Мастер'};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function todayStr(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function orderDay(o){
  if(o.orderDate) return String(o.orderDate).slice(0,10);
  if(o.createdAt){const d=new Date(o.createdAt);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  return '';
}

async function loadMe(){
  try{
    const r=await fetch(ME_API,{cache:'no-store'});
    if(r.status===401){location.href='/login?from=/master';return;}
    me=r.ok?await r.json():null;
  }catch(e){me=null;}
  const nm=(me&&me.name)||'Мастер';
  const ini=(nm.trim()[0]||'М').toUpperCase();
  document.getElementById('hdr-avatar').textContent=ini;
  document.getElementById('pf-avatar').textContent=ini;
  document.getElementById('pf-name').textContent=nm;
  const sub=document.getElementById('pf-sub'); if(sub) sub.textContent='🚗 '+(ROLE_LABEL[me&&me.role]||'Мастер');
}

async function loadCounts(){
  try{const r=await fetch(COMMENTS_API+'/counts?entityType=order',{cache:'no-store'});
    if(r.ok){commentCounts={};(await r.json()).forEach(c=>commentCounts[c.entityId]=c.count);}
  }catch(e){}
}

async function loadOrders(){
  const list=document.getElementById('orders-list');
  list.innerHTML='<div class="loading">Загрузка…</div>';
  try{
    const [r]=await Promise.all([fetch(ORDERS_API+'?source=field_check',{cache:'no-store'}), loadCounts()]);
    if(r.status===401){location.href='/login?from=/master';return;}
    if(!r.ok) throw new Error('HTTP '+r.status);
    orders=await r.json();
  }catch(e){list.innerHTML='<div class="empty">⚠️ Ошибка: '+esc(e.message)+'</div>';return;}
  render();
}

function visibleOrders(){
  const t=todayStr();
  return filter==='today' ? orders.filter(o=>orderDay(o)===t) : orders;
}
function setFilter(f){filter=f;
  document.getElementById('f-today').classList.toggle('on',f==='today');
  document.getElementById('f-all').classList.toggle('on',f==='all');
  render();
}

function stTag(s){return s==='Готова'?{c:'#059669',t:'✅ Готова'}:s==='Отменён'?{c:'#dc2626',t:'❌ Отменён'}:{c:'#1d4ed8',t:'🔄 В работе'};}

function orderCardHtml(o){
  const st=stTag(o.status);
  const cls=o.status==='Готова'?'done':o.status==='Отменён'?'cancelled':'';
  const positions=(Array.isArray(o.positions)&&o.positions.length)?o.positions:[{address:o.address,qty:o.qty,water:o.waterType}];
  const pos=positions.map(p=>`<div class="oc-pos">📍 ${esc(p.address)} — <b>${esc(p.qty||0)} шт.</b>${p.water?' · '+esc(p.water):''}</div>`).join('');
  const photos=Array.isArray(o.photos)?o.photos:[];
  const thumbs=photos.length?`<div class="thumbs">${photos.slice(0,4).map(p=>`<img class="thumb" src="${p}">`).join('')}${photos.length>4?`<div class="thumb" style="display:flex;align-items:center;justify-content:center;background:#f3f4f6;color:#6b7280;font-weight:700;">+${photos.length-4}</div>`:''}</div>`:'';
  const cc=commentCounts[o.id]||0;
  return `<div class="order-card ${cls}">
    <div class="oc-top"><span class="oc-no">${esc(o.orderNo||'—')}</span><span class="oc-st" style="color:${st.c};">${st.t}</span></div>
    ${o.clientName?`<div class="oc-client">${esc(o.clientName)}</div>`:''}
    <div class="oc-phone">📞 ${esc(o.phone||'—')}</div>
    ${pos}
    ${o.comment?`<div class="oc-comment">💬 ${esc(o.comment)}</div>`:''}
    ${thumbs}
    <div class="oc-actions">
      ${o.status!=='Готова'?`<button class="oc-btn b-done" onclick="setStatus('${o.id}','Готова')">✅ Готова</button>`:`<button class="oc-btn b-work" onclick="setStatus('${o.id}','В работе')">↩ В работу</button>`}
      ${o.status!=='Отменён'?`<button class="oc-btn b-cancel" onclick="setStatus('${o.id}','Отменён')">❌ Отменить</button>`:''}
      <button class="oc-btn b-photo" onclick="openPhotos('${o.id}')">📷 Фото${photos.length?' ('+photos.length+')':''}</button>
      <button class="oc-btn b-comment" onclick="openComments('${o.id}')">💬 Коммент.${cc?' ('+cc+')':''}</button>
    </div>
  </div>`;
}

function render(){
  const list=document.getElementById('orders-list');
  const vis=visibleOrders();
  const active=vis.filter(o=>o.status!=='Готова'&&o.status!=='Отменён');
  const done=vis.filter(o=>o.status==='Готова').length;
  // stats
  document.getElementById('stats').innerHTML=`
    <div class="stat-chip sc-new"><div class="sc-num">${active.length}</div><div class="sc-lbl">В работе</div></div>
    <div class="stat-chip sc-done"><div class="sc-num">${done}</div><div class="sc-lbl">Готово</div></div>
    <div class="stat-chip"><div class="sc-num">${vis.length}</div><div class="sc-lbl">Всего</div></div>`;
  list.innerHTML=vis.length?vis.map(orderCardHtml).join(''):`<div class="empty">${filter==='today'?'На сегодня заявок нет':'Заявок нет'}</div>`;
  // nav badge = активные заявки сегодня
  const t=todayStr();
  const todayActive=orders.filter(o=>orderDay(o)===t&&o.status!=='Готова'&&o.status!=='Отменён').length;
  const b=document.getElementById('nav-orders-badge');
  b.style.display=todayActive?'block':'none';b.textContent=todayActive;
  // history
  const hist=orders.filter(o=>o.status==='Готова');
  document.getElementById('history-list').innerHTML=hist.length?hist.map(orderCardHtml).join(''):'<div class="empty">Пока нет выполненных заявок</div>';
}

async function patchOrder(id,body){
  const res=await fetch(ORDERS_API+'/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(res.status===401){location.href='/login?from=/master';throw new Error('auth');}
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

async function setStatus(id,status){
  if(status==='Отменён'&&!confirm('Отменить заявку?'))return;
  try{const upd=await patchOrder(id,{status});const i=orders.findIndex(o=>o.id===id);if(i>=0)orders[i]=upd;render();
    toast(status==='Готова'?'✅ Заявка готова':status==='Отменён'?'❌ Отменена':'↩ Возвращена в работу');
  }catch(e){if(e.message!=='auth')toast('⚠️ '+e.message);}
}

// ── PHOTOS ────────────────────────────────────────────────────
function currentOrder(){return orders.find(o=>o.id===activeOrderId);}
function openPhotos(id){activeOrderId=id;renderPhotoGrid();openSheet('photoSheet');}
function renderPhotoGrid(){
  const o=currentOrder();const photos=(o&&Array.isArray(o.photos))?o.photos:[];
  document.getElementById('photoGrid').innerHTML=
    photos.map((p,i)=>`<div class="pg-item"><img src="${p}"><button class="pg-del" onclick="delPhoto(${i})">✕</button></div>`).join('')+
    `<div class="pg-add" onclick="document.getElementById('photoInput').click()">＋</div>`;
}
function compress(file,maxDim,q){return new Promise((res,rej)=>{const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{URL.revokeObjectURL(url);let w=img.width,h=img.height;
    if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    res(c.toDataURL('image/jpeg',q));};
  img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('Не удалось прочитать фото'));};img.src=url;});}
async function onPhotoPick(ev){
  const files=[...ev.target.files];ev.target.value='';if(!files.length)return;
  const o=currentOrder();if(!o)return;
  toast('⏳ Обработка фото…');
  try{
    const compressed=[];for(const f of files){compressed.push(await compress(f,1100,0.6));}
    const photos=[...(Array.isArray(o.photos)?o.photos:[]),...compressed];
    const upd=await patchOrder(o.id,{photos});const i=orders.findIndex(x=>x.id===o.id);if(i>=0)orders[i]=upd;
    renderPhotoGrid();render();toast('📷 Добавлено фото: '+compressed.length);
  }catch(e){if(e.message!=='auth')toast('⚠️ '+e.message);}
}
async function delPhoto(idx){
  const o=currentOrder();if(!o)return;
  const photos=(Array.isArray(o.photos)?o.photos:[]).filter((_,i)=>i!==idx);
  try{const upd=await patchOrder(o.id,{photos});const i=orders.findIndex(x=>x.id===o.id);if(i>=0)orders[i]=upd;renderPhotoGrid();render();toast('🗑 Фото удалено');}
  catch(e){if(e.message!=='auth')toast('⚠️ '+e.message);}
}

// ── COMMENTS ──────────────────────────────────────────────────
function openComments(id){activeOrderId=id;document.getElementById('cmtBody').innerHTML='<div class="loading">Загрузка…</div>';openSheet('cmtSheet');loadComments();}
async function loadComments(){
  try{const r=await fetch(COMMENTS_API+'?entityType=order&entityId='+activeOrderId,{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const items=await r.json();
    document.getElementById('cmtBody').innerHTML=items.length?items.map(c=>`<div class="cmt"><div class="cmt-head"><span>${esc(c.authorName||'—')}</span><span>${new Date(c.createdAt).toLocaleString('ru-KZ',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div><div class="cmt-text">${esc(c.text)}</div></div>`).join(''):'<div class="empty">Комментариев пока нет</div>';
    document.getElementById('cmtBody').scrollTop=document.getElementById('cmtBody').scrollHeight;
  }catch(e){document.getElementById('cmtBody').innerHTML='<div class="empty">⚠️ '+esc(e.message)+'</div>';}
}
async function sendComment(){
  const inp=document.getElementById('cmtInput');const text=inp.value.trim();if(!text)return;inp.value='';
  try{
    const r=await fetch(COMMENTS_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entityType:'order',entityId:activeOrderId,text})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    commentCounts[activeOrderId]=(commentCounts[activeOrderId]||0)+1;
    await loadComments();render();
  }catch(e){toast('⚠️ '+e.message);inp.value=text;}
}

// ── SHEETS / NAV ──────────────────────────────────────────────
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  if(id==='tasks' && window.CabinetCommon) CabinetCommon.renderTasks();
}

// ── INIT ──────────────────────────────────────────────────────
(async function(){
  await loadMe();
  document.getElementById('hdr-sub').textContent=(me&&me.name?me.name:'Мастер')+' · '+new Date().toLocaleDateString('ru-KZ');
  await loadOrders();
  setInterval(loadOrders,60000);
  // Общий модуль: колокольчик + экран «Задачи» + комментарии
  if(window.CabinetCommon) CabinetCommon.init({ me, onOpenTasks:()=>goScreen('tasks') });
})();
</script>
